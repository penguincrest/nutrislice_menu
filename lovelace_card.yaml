# ─── Nutrislice School Menu – Lovelace card ──────────────────────────────────
# Before 9:30 AM  → shows today's menu
# 9:30 AM onwards → shows tomorrow's menu
#
# Entity IDs for Chenoweth Elementary (JCPS):
#   sensor.chenoweth_menu_breakfast_today
#   sensor.chenoweth_menu_lunch_today
#   calendar.chenoweth_menu_school_menu
#
# Find your real entity IDs under:
#   Settings → Devices & Services → Nutrislice School Menu → your device

type: vertical-stack
cards:

  # ── Date header ────────────────────────────────────────────────────────────
  - type: markdown
    content: >
      {% set sensor = 'sensor.chenoweth_menu_breakfast_today' %}
      {% set showing = state_attr(sensor, 'showing') %}
      {% set date_str = state_attr(sensor, 'date') %}
      {% if date_str %}
        {% set d = strptime(date_str, '%Y-%m-%d') %}
        {% set label = 'Tomorrow' if showing == 'tomorrow' else 'Today' %}
        <p style="font-size:15px;font-weight:500;color:var(--primary-text-color);margin:0;">
          {{ label }} — {{ d.strftime('%A, %B %-d') }}
        </p>
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: none;
          box-shadow: none;
          border: none;
          padding: 4px 0 0 0;
        }

  # ── No-school banner (shown only when both meals are empty = holiday) ─────
  - type: markdown
    content: >
      <p style="font-size:18px;font-weight:600;color:var(--primary-text-color);margin:8px 0 4px 0;">
        🚫 No School!
      </p>
      <p style="font-size:14px;color:var(--secondary-text-color);margin:0;">
        No menu posted for this day — looks like a holiday or break.
      </p>
    visibility:
      - condition: template
        value_template: >
          {% set bk = state_attr('sensor.chenoweth_menu_breakfast_today', 'items') %}
          {% set ln = state_attr('sensor.chenoweth_menu_lunch_today', 'items') %}
          {% set bk_state = states('sensor.chenoweth_menu_breakfast_today') %}
          {% set ln_state = states('sensor.chenoweth_menu_lunch_today') %}
          {% set ok = bk_state not in ['unavailable','unknown'] and ln_state not in ['unavailable','unknown'] %}
          {{ ok and (bk is none or bk|length == 0) and (ln is none or ln|length == 0) }}

  # ── Breakfast ──────────────────────────────────────────────────────────────
  - type: markdown
    title: "🍳 Breakfast"
    visibility:
      - condition: template
        value_template: >
          {% set bk = state_attr('sensor.chenoweth_menu_breakfast_today', 'items') %}
          {% set ln = state_attr('sensor.chenoweth_menu_lunch_today', 'items') %}
          {{ not ((bk is none or bk|length == 0) and (ln is none or ln|length == 0)) }}
    content: >
      {% set sensor = 'sensor.chenoweth_menu_breakfast_today' %}
      {% set items = state_attr(sensor, 'items') %}
      {% if states(sensor) == 'unavailable' or items is none %}
        <p class="state-msg">Sensor unavailable – check the integration loaded correctly.</p>
      {% elif items | length == 0 %}
        <p class="state-msg">No breakfast served.</p>
      {% else %}
        {% set entrees = items | selectattr('category','equalto','entree') | list %}
        {% set sides   = items | rejectattr('category','equalto','entree') | list %}
        {% if entrees | length > 0 %}
        <div class="menu-row entrees">
        {% for item in entrees %}
          <div class="menu-tile entree">
            {% if item['image'] %}
              <input type="checkbox" id="zoom-bk-e{{ loop.index }}" class="zoom-toggle">
              <label for="zoom-bk-e{{ loop.index }}" class="zoom-label">
                <img src="{{ item['image'] }}" class="zoom-thumb">
              </label>
            {% else %}
              <div class="placeholder"></div>
            {% endif %}
            <span class="tile-name">{{ item['name'] }}</span>
          </div>
        {% endfor %}
        </div>
        {% endif %}
        {% if sides | length > 0 %}
        <div class="menu-row sides">
        {% for item in sides %}
          <div class="menu-tile side">
            {% if item['image'] %}
              <input type="checkbox" id="zoom-bk-s{{ loop.index }}" class="zoom-toggle">
              <label for="zoom-bk-s{{ loop.index }}" class="zoom-label">
                <img src="{{ item['image'] }}" class="zoom-thumb">
              </label>
            {% else %}
              <div class="placeholder"></div>
            {% endif %}
            <span class="tile-name">{{ item['name'] }}</span>
            {% if item['category'] %}
              <span class="tile-cat">{{ item['category'] }}</span>
            {% endif %}
          </div>
        {% endfor %}
        </div>
        {% endif %}
      {% endif %}
    card_mod:
      style: |
        .state-msg { color: var(--secondary-text-color); font-size: 14px; margin: 4px 0; }
        .menu-row {
          display: grid;
          gap: 14px;
          padding: 4px 0;
        }
        .menu-row.entrees {
          grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
          margin-bottom: 16px;
        }
        .menu-row.sides {
          grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
        }
        .menu-tile {
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
        }
        .menu-tile .tile-name {
          line-height: 1.25;
          color: var(--primary-text-color);
          margin-top: 6px;
        }
        .menu-tile.entree .tile-name { font-size: 14px; font-weight: 600; }
        .menu-tile.side   .tile-name { font-size: 12px; font-weight: 500; }
        .menu-tile .tile-cat {
          font-size: 10px;
          color: var(--secondary-text-color);
          text-transform: uppercase;
          letter-spacing: 0.05em;
          margin-top: 2px;
        }
        .menu-tile .placeholder {
          width: 100%;
          aspect-ratio: 1;
          border-radius: 10px;
          background: var(--secondary-background-color);
          border: 1px solid var(--divider-color);
        }
        .zoom-toggle { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; margin: 0; }
        .zoom-label { display: block; cursor: zoom-in; width: 100%; }
        .zoom-thumb {
          width: 100%;
          aspect-ratio: 1;
          object-fit: cover;
          border-radius: 10px;
          border: 1px solid var(--divider-color);
          display: block;
          transition: transform 120ms ease;
        }
        .zoom-thumb:hover { transform: scale(1.04); }
        .zoom-toggle:checked ~ .zoom-label {
          position: fixed; inset: 0; z-index: 9999;
          background: rgba(0,0,0,0.85);
          display: flex; align-items: center; justify-content: center;
          cursor: zoom-out;
        }
        .zoom-toggle:checked ~ .zoom-label .zoom-thumb {
          width: auto; height: auto;
          aspect-ratio: auto;
          max-width: 92vw; max-height: 92vh;
          border-radius: 12px; border: none;
          box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

