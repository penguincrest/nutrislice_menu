# ─── Lovelace card ───────────────────────────────────────────────────────────
# Paste into a Manual card on your dashboard.
# Update the sensor entity names to match your school slug if different.
# The calendar entity is created automatically by the integration — no setup.

type: vertical-stack
title: "🏫 School Menu"
cards:
  - type: markdown
    title: "🍳 Today's Breakfast"
    content: >
      {% set items = state_attr('sensor.chenoweth_breakfast_today', 'items') %}
      {% if items %}
        {% for item in items %}
          - **{{ item.name }}**{% if item.image %}
          ![]( {{- item.image -}} ){width=80}{% endif %}

        {% endfor %}
      {% else %}
        _No breakfast data — run the sync_menu service to populate._
      {% endif %}

  - type: markdown
    title: "🥗 Today's Lunch"
    content: >
      {% set items = state_attr('sensor.chenoweth_lunch_today', 'items') %}
      {% if items %}
        {% for item in items %}
          - **{{ item.name }}**{% if item.image %}
          ![]( {{- item.image -}} ){width=80}{% endif %}

        {% endfor %}
      {% else %}
        _No lunch data — run the sync_menu service to populate._
      {% endif %}

  # The calendar entity below is created automatically by the integration.
  # Its entity_id follows the pattern: calendar.nutrislice_<school>
  # e.g. calendar.nutrislice_chenoweth
  - type: calendar
    entities:
      - calendar.nutrislice_chenoweth   # ← update to match your school slug
    initial_view: dayGridWeek
