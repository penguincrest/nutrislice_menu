# ─── Nutrislice School Menu – Lovelace card ──────────────────────────────────
# Before 9:30 AM  → shows today's menu
# 9:30 AM onwards → shows tomorrow's menu
#
# Entity IDs for Chenoweth Elementary (JCPS):
#   sensor.chenoweth_school_menu_breakfast_today
#   sensor.chenoweth_school_menu_lunch_today
#   calendar.chenoweth_menu_school_menu
#
# Find your real entity IDs under:
#   Settings → Devices & Services → Nutrislice School Menu → your device
#
# Markdown-card gotchas this template works around:
#   1) Lines indented 4+ spaces become <pre><code> blocks → keep all template
#      content at the SAME column with `|` (literal) scalars.
#   2) Blank lines break out of HTML-block mode → use `{%- -%}` whitespace
#      controls so the rendered output is one continuous string.
#   3) The HTML sanitizer strips <label> and <span> → use <div>+<img> only,
#      and <a> for click-to-open-image-in-new-tab.

type: vertical-stack
cards:

  # Date header
  - type: markdown
    content: |
      {%- set sensor = 'sensor.chenoweth_school_menu_breakfast_today' -%}
      {%- set date_str = state_attr(sensor, 'date') -%}
      {%- if date_str -%}
        {%- set d = strptime(date_str, '%Y-%m-%d') -%}
        {%- set today = now().date() -%}
        {%- set target = d.date() -%}
        {%- if target == today -%}{%- set label = 'Today' -%}
        {%- elif target == today + timedelta(days=1) -%}{%- set label = 'Tomorrow' -%}
        {%- else -%}{%- set label = d.strftime('%A') -%}
        {%- endif -%}
        <p class="date-header">{{ label }} — {{ d.strftime('%A, %B %-d') }}</p>
      {%- endif -%}
    card_mod:
      style: |
        ha-card {
          background: none;
          box-shadow: none;
          border: none;
          padding: 4px 0 0 0;
        }
        .date-header {
          font-size: 15px;
          font-weight: 500;
          color: var(--primary-text-color);
          margin: 0;
        }

  # Breakfast — defines anchors that the Lunch card reuses below.
  - type: markdown
    title: "🍳 Breakfast"
    content: |
      {%- set sensor = 'sensor.chenoweth_school_menu_breakfast_today' -%}
      {%- set items = state_attr(sensor, 'items') -%}
      {%- if items is none -%}
      <p class="state-msg">⏳ No menu data yet — call <code>nutrislice_menu.sync_menu</code>.</p>
      {%- elif items | length == 0 -%}
      <p class="state-msg">No breakfast served.</p>
      {%- else -%}
      {%- set entrees = items | selectattr('category','equalto','entree') | list -%}
      {%- set sides = items | rejectattr('category','equalto','entree') | list -%}
      {%- if entrees | length > 0 -%}
      <div class="menu-row entrees">{%- for item in entrees -%}<div class="menu-tile entree">{%- if item.image -%}<a href="{{ item.image }}" target="_blank" rel="noopener"><img src="{{ item.image }}" class="thumb"></a>{%- else -%}<div class="placeholder"></div>{%- endif -%}<div class="tile-name">{{ item.name }}</div></div>{%- endfor -%}</div>
      {%- endif -%}
      {%- if sides | length > 0 -%}
      <div class="menu-row sides">{%- for item in sides -%}<div class="menu-tile side">{%- if item.image -%}<a href="{{ item.image }}" target="_blank" rel="noopener"><img src="{{ item.image }}" class="thumb"></a>{%- else -%}<div class="placeholder"></div>{%- endif -%}<div class="tile-name">{{ item.name }}</div>{%- if item.category -%}<div class="tile-cat">{{ item.category }}</div>{%- endif -%}</div>{%- endfor -%}</div>
      {%- endif -%}
      {%- endif -%}
    card_mod: &meal_card_mod
      style: |
        .state-msg {
          color: var(--secondary-text-color);
          font-size: 14px;
          margin: 4px 0;
        }
        .menu-row {
          gap: 14px;
          padding: 4px 0;
        }
        .menu-row.entrees {
          display: flex;
          flex-direction: row;
          margin-bottom: 16px;
        }
        .menu-row.entrees .menu-tile {
          flex: 1 1 0;
          min-width: 0;
        }
        .menu-row.sides {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(82px, 1fr));
        }
        .menu-tile {
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
        }
        .menu-tile a {
          width: 100%;
          display: block;
          line-height: 0;
        }
        .menu-tile .thumb {
          width: 100%;
          aspect-ratio: 1;
          object-fit: cover;
          border-radius: 10px;
          border: 1px solid var(--divider-color);
          display: block;
          transition: transform 120ms ease;
        }
        .menu-tile .thumb:hover { transform: scale(1.04); }
        .menu-tile .placeholder {
          width: 100%;
          aspect-ratio: 1;
          border-radius: 10px;
          background: var(--secondary-background-color);
          border: 1px solid var(--divider-color);
        }
        .menu-tile .tile-name {
          line-height: 1.25;
          color: var(--primary-text-color);
          margin-top: 6px;
        }
        .menu-tile.entree .tile-name { font-size: 14px; font-weight: 600; }
        .menu-tile.side   .tile-name { font-size: 12px; font-weight: 500; }
        .menu-tile .tile-cat {
          font-size: 10px;
          color: var(--secondary-text-color);
          text-transform: uppercase;
          letter-spacing: 0.05em;
          margin-top: 2px;
        }

  # Lunch — re-uses CSS anchor from Breakfast.
  - type: markdown
    title: "🥗 Lunch"
    content: |
      {%- set sensor = 'sensor.chenoweth_school_menu_lunch_today' -%}
      {%- set items = state_attr(sensor, 'items') -%}
      {%- if items is none -%}
      <p class="state-msg">⏳ No menu data yet — call <code>nutrislice_menu.sync_menu</code>.</p>
      {%- elif items | length == 0 -%}
      <p class="state-msg">No lunch served.</p>
      {%- else -%}
      {%- set entrees = items | selectattr('category','equalto','entree') | list -%}
      {%- set sides = items | rejectattr('category','equalto','entree') | list -%}
      {%- if entrees | length > 0 -%}
      <div class="menu-row entrees">{%- for item in entrees -%}<div class="menu-tile entree">{%- if item.image -%}<a href="{{ item.image }}" target="_blank" rel="noopener"><img src="{{ item.image }}" class="thumb"></a>{%- else -%}<div class="placeholder"></div>{%- endif -%}<div class="tile-name">{{ item.name }}</div></div>{%- endfor -%}</div>
      {%- endif -%}
      {%- if sides | length > 0 -%}
      <div class="menu-row sides">{%- for item in sides -%}<div class="menu-tile side">{%- if item.image -%}<a href="{{ item.image }}" target="_blank" rel="noopener"><img src="{{ item.image }}" class="thumb"></a>{%- else -%}<div class="placeholder"></div>{%- endif -%}<div class="tile-name">{{ item.name }}</div>{%- if item.category -%}<div class="tile-cat">{{ item.category }}</div>{%- endif -%}</div>{%- endfor -%}</div>
      {%- endif -%}
      {%- endif -%}
    card_mod: *meal_card_mod

  # Weekly calendar view
  - type: calendar
    entities:
      - calendar.chenoweth_menu_school_menu
    initial_view: dayGridWeek
