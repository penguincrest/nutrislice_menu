# ─── Nutrislice School Menu – Lovelace card ──────────────────────────────────
# Before 9:30 AM  → shows today's menu
# 9:30 AM onwards → shows tomorrow's menu
#
# Entity IDs for Chenoweth Elementary (JCPS):
#   sensor.chenoweth_menu_breakfast_today
#   sensor.chenoweth_menu_lunch_today
#   calendar.chenoweth_menu_school_menu
#
# Find your real entity IDs under:
#   Settings → Devices & Services → Nutrislice School Menu → your device

type: vertical-stack
cards:

  # ── Date header ────────────────────────────────────────────────────────────
  - type: markdown
    content: >
      {% set sensor = 'sensor.chenoweth_menu_breakfast_today' %}
      {% set showing = state_attr(sensor, 'showing') %}
      {% set date_str = state_attr(sensor, 'date') %}
      {% if date_str %}
        {% set d = strptime(date_str, '%Y-%m-%d') %}
        {% set label = 'Tomorrow' if showing == 'tomorrow' else 'Today' %}
        <p style="font-size:15px;font-weight:500;color:var(--primary-text-color);margin:0;">
          {{ label }} — {{ d.strftime('%A, %B %-d') }}
        </p>
      {% endif %}
    card_mod:
      style: |
        ha-card {
          background: none;
          box-shadow: none;
          border: none;
          padding: 4px 0 0 0;
        }

  # ── No-school banner (shown only when both meals are empty = holiday) ─────
  - type: markdown
    content: >
      <p style="font-size:18px;font-weight:600;color:var(--primary-text-color);margin:8px 0 4px 0;">
        🚫 No School!
      </p>
      <p style="font-size:14px;color:var(--secondary-text-color);margin:0;">
        No menu posted for this day — looks like a holiday or break.
      </p>
    visibility:
      - condition: template
        value_template: >
          {% set bk = state_attr('sensor.chenoweth_menu_breakfast_today', 'items') %}
          {% set ln = state_attr('sensor.chenoweth_menu_lunch_today', 'items') %}
          {% set bk_state = states('sensor.chenoweth_menu_breakfast_today') %}
          {% set ln_state = states('sensor.chenoweth_menu_lunch_today') %}
          {% set ok = bk_state not in ['unavailable','unknown'] and ln_state not in ['unavailable','unknown'] %}
          {{ ok and (bk is none or bk|length == 0) and (ln is none or ln|length == 0) }}

  # ── Breakfast ──────────────────────────────────────────────────────────────
  - type: markdown
    title: "🍳 Breakfast"
    visibility:
      - condition: template
        value_template: >
          {% set bk = state_attr('sensor.chenoweth_menu_breakfast_today', 'items') %}
          {% set ln = state_attr('sensor.chenoweth_menu_lunch_today', 'items') %}
          {{ not ((bk is none or bk|length == 0) and (ln is none or ln|length == 0)) }}
    content: >
      {% set sensor = 'sensor.chenoweth_menu_breakfast_today' %}
      {% set items = state_attr(sensor, 'items') %}
      {% if states(sensor) in ['unavailable','unknown'] %}
        <p style="color:var(--secondary-text-color);font-size:14px;">Sensor unavailable – check the integration loaded correctly.</p>
      {% elif items is none or items | length == 0 %}
        <p style="color:var(--secondary-text-color);font-size:14px;">No breakfast served.</p>
      {% else %}
        <div style="display:flex;flex-wrap:wrap;gap:12px;padding:4px 0;">
        {% for item in items %}
          <div style="display:flex;flex-direction:column;align-items:center;width:90px;">
            {% if item.image %}
              <input type="checkbox" id="zoom-bk-{{ loop.index }}" class="zoom-toggle">
              <label for="zoom-bk-{{ loop.index }}" class="zoom-label">
                <img src="{{ item.image }}" class="zoom-thumb" onerror="this.style.display='none'">
              </label>
            {% else %}
              <div style="width:72px;height:72px;border-radius:8px;background:var(--secondary-background-color);border:1px solid var(--divider-color);"></div>
            {% endif %}
            <span style="font-size:13px;font-weight:500;text-align:center;margin-top:5px;line-height:1.3;color:var(--primary-text-color);">{{ item.name }}</span>
            {% if item.category %}
              <span style="font-size:11px;color:var(--secondary-text-color);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;">{{ item.category }}</span>
            {% endif %}
          </div>
        {% endfor %}
        </div>
      {% endif %}
    card_mod:
      style: |
        .zoom-toggle { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; margin: 0; }
        .zoom-label { display: block; cursor: zoom-in; }
        .zoom-thumb {
          width: 72px; height: 72px; object-fit: cover;
          border-radius: 8px; border: 1px solid var(--divider-color);
          display: block;
          transition: transform 120ms ease;
        }
        .zoom-thumb:hover { transform: scale(1.04); }
        .zoom-toggle:checked ~ .zoom-label {
          position: fixed; inset: 0; z-index: 9999;
          background: rgba(0,0,0,0.85);
          display: flex; align-items: center; justify-content: center;
          cursor: zoom-out;
        }
        .zoom-toggle:checked ~ .zoom-label .zoom-thumb {
          width: auto; height: auto;
          max-width: 92vw; max-height: 92vh;
          border-radius: 12px; border: none;
          box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

  # ── Lunch ──────────────────────────────────────────────────────────────────
  - type: markdown
    title: "🥗 Lunch"
    visibility:
      - condition: template
        value_template: >
          {% set bk = state_attr('sensor.chenoweth_menu_breakfast_today', 'items') %}
          {% set ln = state_attr('sensor.chenoweth_menu_lunch_today', 'items') %}
          {{ not ((bk is none or bk|length == 0) and (ln is none or ln|length == 0)) }}
    content: >
      {% set sensor = 'sensor.chenoweth_menu_lunch_today' %}
      {% set items = state_attr(sensor, 'items') %}
      {% if states(sensor) in ['unavailable','unknown'] %}
        <p style="color:var(--secondary-text-color);font-size:14px;">Sensor unavailable – check the integration loaded correctly.</p>
      {% elif items is none or items | length == 0 %}
        <p style="color:var(--secondary-text-color);font-size:14px;">No lunch served.</p>
      {% else %}
        <div style="display:flex;flex-wrap:wrap;gap:12px;padding:4px 0;">
        {% for item in items %}
          <div style="display:flex;flex-direction:column;align-items:center;width:90px;">
            {% if item.image %}
              <input type="checkbox" id="zoom-ln-{{ loop.index }}" class="zoom-toggle">
              <label for="zoom-ln-{{ loop.index }}" class="zoom-label">
                <img src="{{ item.image }}" class="zoom-thumb" onerror="this.style.display='none'">
              </label>
            {% else %}
              <div style="width:72px;height:72px;border-radius:8px;background:var(--secondary-background-color);border:1px solid var(--divider-color);"></div>
            {% endif %}
            <span style="font-size:13px;font-weight:500;text-align:center;margin-top:5px;line-height:1.3;color:var(--primary-text-color);">{{ item.name }}</span>
            {% if item.category %}
              <span style="font-size:11px;color:var(--secondary-text-color);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;">{{ item.category }}</span>
            {% endif %}
          </div>
        {% endfor %}
        </div>
      {% endif %}
    card_mod:
      style: |
        .zoom-toggle { position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0; margin: 0; }
        .zoom-label { display: block; cursor: zoom-in; }
        .zoom-thumb {
          width: 72px; height: 72px; object-fit: cover;
          border-radius: 8px; border: 1px solid var(--divider-color);
          display: block;
          transition: transform 120ms ease;
        }
        .zoom-thumb:hover { transform: scale(1.04); }
        .zoom-toggle:checked ~ .zoom-label {
          position: fixed; inset: 0; z-index: 9999;
          background: rgba(0,0,0,0.85);
          display: flex; align-items: center; justify-content: center;
          cursor: zoom-out;
        }
        .zoom-toggle:checked ~ .zoom-label .zoom-thumb {
          width: auto; height: auto;
          max-width: 92vw; max-height: 92vh;
          border-radius: 12px; border: none;
          box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

  # ── Weekly calendar view ───────────────────────────────────────────────────
  - type: calendar
    entities:
      - calendar.chenoweth_menu_school_menu
    initial_view: dayGridWeek
