# ─── Example automations ─────────────────────────────────────────────────────
# These call nutrislice_menu.sync_menu to fetch menus and populate the calendar.
# Adjust the schedule to your preference.
#
# To target a specific school when you have multiple configured, add:
#   data:
#     entry_id: "YOUR_ENTRY_ID"
# Find entry_id under Settings → Integrations → Nutrislice School Menu → ⋮ → System info.

- alias: "School menu – sync Sunday evening"
  id: nutrislice_sync_sunday
  description: "Fetch next week's menus every Sunday at 8 PM"
  trigger:
    - platform: time
      at: "20:00:00"
  condition:
    - condition: time
      weekday: [sun]
  action:
    - service: nutrislice_menu.sync_menu

- alias: "School menu – sync Monday morning backup"
  id: nutrislice_sync_monday
  description: "Catch any Sunday failures with a Monday morning retry"
  trigger:
    - platform: time
      at: "06:00:00"
  condition:
    - condition: time
      weekday: [mon]
  action:
    - service: nutrislice_menu.sync_menu

# ─── Optional: morning notification ──────────────────────────────────────────
# Replace notify.mobile_app_YOUR_PHONE with your actual notify target.
# Update sensor entity names to match your school's slug.

- alias: "School menu – morning notification"
  id: nutrislice_morning_notify
  description: "Push today's menu each school morning"
  trigger:
    - platform: time
      at: "07:15:00"
  condition:
    - condition: time
      weekday: [mon, tue, wed, thu, fri]
  action:
    - service: notify.mobile_app_YOUR_PHONE
      data:
        title: "🏫 School Menu Today"
        message: >
          🍳 {{ states('sensor.chenoweth_breakfast_today') }}

          🥗 {{ states('sensor.chenoweth_lunch_today') }}
        data:
          image: "{{ state_attr('sensor.chenoweth_lunch_today', 'hero_image') }}"
